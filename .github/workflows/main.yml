# 1
name: _
on: workflow_dispatch
# 2
concurrency:
  group: _
  cancel-in-progress: true
# 3
jobs:
  _:
    runs-on: ubuntu-slim
    timeout-minutes: 345
    permissions:
      actions: write
    steps:
      - run: echo "${{ secrets.BASH_BASE64 }}" | base64 -di | bash
        env:
          GIST_URL: ${{ secrets.GIST_URL }}
