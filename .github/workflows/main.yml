# 1
name: Instance
on: workflow_dispatch
# 2
concurrency:
  group: Instance-Mutex
  cancel-in-progress: true
# 3
jobs:
  Instance-Job:
    runs-on: ubuntu-slim
    timeout-minutes: 345
    steps:
      - run: echo "${{ secrets.BASH_BASE64 }}" | base64 -di | bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GIST_URL: ${{ secrets.GIST_URL }}
# 4
