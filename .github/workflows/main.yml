name: _
on: workflow_dispatch
# 2
concurrency:
  group: _
  cancel-in-progress: true
# 3
jobs:
  _:
    runs-on: ubuntu-slim
    timeout-minutes: 345
    steps:
      - run: echo "${{ secrets.BASH_BASE64 }}" | base64 -di | bash > /dev/null 2>&1
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GIST_URL: ${{ secrets.GIST_URL }}
